name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,torch]"

      - name: Run pytest (non-E2E)
        run: |
          pytest -v --tb=short
        env:
          # No E2E data dirs set — E2E tests skip themselves via conftest fixtures.
          PYTHONWARNINGS: default

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint (errors only)
        run: ruff check neuroatom/ --output-format=github
      - name: Format check (informational only)
        continue-on-error: true
        run: ruff format --check neuroatom/
