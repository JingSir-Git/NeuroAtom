# OpenBMI — 2-class Motor Imagery
# Lee et al., GigaScience 2019 (doi:10.1093/gigascience/giz002)
# 54 subjects × 2 sessions, 62 EEG channels, 1000 Hz
#
# Paradigm: cued motor imagery — right hand vs left hand
# Trial structure: 4s epoch from cue onset
# 100 trials per session (50 per class), pre-segmented in .mat
#
# .mat structure:
#   EEG_MI_train / EEG_MI_test: struct with fields
#     smt:  (4000, 100, 62)  — segmented trials (samples × trials × channels)
#     x:    (N, 62)           — continuous EEG
#     t:    (1, 100)          — trial onset indices
#     fs:   1000              — sampling rate
#     y_dec:   (1, 100)       — class labels (1=right, 2=left)
#     y_class: (1, 100)       — class label strings
#     class:   (2, 2)         — class mapping: [1, 'right'; 2, 'left']
#     chan: (1, 62)            — channel name strings
#     ival: (1, 4000)         — sample indices within epoch
#     time_interval: [0, 4000]
#     EMG:       (N, 4)       — EMG channels (not imported)
#     EMG_index: (1, 4)       — EMG channel names
#     pre_rest:  (60000, 62)  — 60s pre-experiment rest
#     post_rest: (60000, 62)  — 60s post-experiment rest
#
# Signal unit: µV (BrainVision amplifier, BrainAmp DC)

dataset_id: "openbmi_mi"
dataset_name: "OpenBMI Motor Imagery"
task_type: "motor_imagery"

trial_definition:
  mode: "pre_segmented"
  field: "smt"
  tmin: 0.0
  tmax: 4.0

class_labels:
  1: "right_hand"
  2: "left_hand"

