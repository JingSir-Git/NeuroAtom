# OpenBMI — ERP (P300 Speller)
# Lee et al., GigaScience 2019 (doi:10.1093/gigascience/giz002)
# 54 subjects × 2 sessions, 62 EEG channels, 1000 Hz
#
# Paradigm: P300 oddball — target vs non-target flash
# Trial structure: 800 ms epoch
# ~1980 trials per session (highly imbalanced: ~330 target, ~1650 nontarget)
#
# .mat structure:
#   EEG_ERP_train / EEG_ERP_test: struct with fields
#     smt:  (800, N_trials, 62) — segmented trials
#     x:    (N, 62)             — continuous EEG
#     fs:   1000
#     y_dec:   (1, N_trials)    — class labels (1=target, 2=nontarget)
#     y_class: (1, N_trials)    — class label strings
#     class:   (2, 2)           — [1, 'target'; 2, 'nontarget']
#     chan: (1, 62)              — channel names
#
# Signal unit: µV

dataset_id: "openbmi_erp"
dataset_name: "OpenBMI Event-Related Potential"
task_type: "erp"

trial_definition:
  mode: "pre_segmented"
  field: "smt"
  tmin: 0.0
  tmax: 0.8

class_labels:
  1: "target"
  2: "nontarget"

signal_unit: "uV"

# Same 62-channel montage as MI (shared across paradigms)
