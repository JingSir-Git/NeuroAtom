# SEED-V: 5-class Emotion Recognition EEG Dataset
# Liu, W., et al. (2021). Identifying the Distinct Differences in Recognizing Five Emotions.
# BCMI Lab, Shanghai Jiao Tong University.
#
# 16 subjects × 3 sessions, Neuroscan .cnt format.
# 62 EEG channels (10-20 system) + VEO + HEO + extras @ 1000 Hz.
# 15 movie clips per session, 5 emotions × 3 repeats.
# Video durations vary (52–297 seconds).
#
# Emotion labels:
#   0: Disgust
#   1: Fear
#   2: Sad
#   3: Neutral
#   4: Happy
#
# Trial timestamps are provided in trial_start_end_timestamp.txt (per session).
# Emotion order is per-session (from emotion_label_and_stimuli_order.xlsx).
#
# Also provides pre-extracted DE features in NPZ format (pickle-serialized).

dataset_id: seed_v
dataset_name: "SEED-V Emotion Recognition"
task_type: emotion_recognition
format: cnt

sampling_rate: 1000
n_eeg_channels: 62
n_total_channels: 66
signal_unit: V

# 62 EEG channels in the standard order from Channel Order.xlsx
channels:
  - FP1
  - FPZ
  - FP2
  - AF3
  - AF4
  - F7
