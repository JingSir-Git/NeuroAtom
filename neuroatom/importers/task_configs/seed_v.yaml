# Mastoid reference channels to exclude from signal storage
# VEO/HEO are now imported as EOG channels
exclude_channels:
  - M1
  - M2

# Emotion classes
class_labels:
  0: Disgust
  1: Fear
  2: Sad
  3: Neutral
  4: Happy

# Session-specific emotion order for 15 trials
# From emotion_label_and_stimuli_order.xlsx
emotion_order:
  session_1: [4, 1, 3, 2, 0, 4, 1, 3, 2, 0, 4, 1, 3, 2, 0]
  session_2: [2, 1, 3, 0, 4, 4, 0, 3, 2, 1, 3, 4, 1, 2, 0]
  session_3: [2, 1, 3, 0, 4, 4, 0, 3, 2, 1, 3, 4, 1, 2, 0]

