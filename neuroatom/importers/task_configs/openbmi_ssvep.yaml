# OpenBMI — SSVEP (Steady-State Visual Evoked Potentials)
# Lee et al., GigaScience 2019 (doi:10.1093/gigascience/giz002)
# 54 subjects × 2 sessions, 62 EEG channels, 1000 Hz
#
# Paradigm: 4-class SSVEP — flicker at 4 frequencies (5.45, 6.67, 8.57, 12 Hz)
# Stimulus directions: up, left, right, down
# Trial structure: 4s epoch
# 100 trials per session (25 per class)
#
# .mat structure:
#   EEG_SSVEP_train / EEG_SSVEP_test: struct with fields
#     smt:  (4000, 100, 62)    — segmented trials
#     x:    (N, 62)             — continuous EEG
#     fs:   1000
#     y_dec:   (1, 100)         — class labels (1=up, 2=left, 3=right, 4=down)
#     y_class: (1, 100)         — class label strings
#     class:   (4, 2)           — [1, 'up'; 2, 'left'; 3, 'right'; 4, 'down']
#     chan: (1, 62)              — channel names
#
# Signal unit: µV

dataset_id: "openbmi_ssvep"
dataset_name: "OpenBMI SSVEP"
task_type: "ssvep"

trial_definition:
  mode: "pre_segmented"
  field: "smt"
  tmin: 0.0
  tmax: 4.0

class_labels:
  1: "up"
  2: "left"
  3: "right"
  4: "down"

# SSVEP stimulus frequencies (Hz) mapped to class indices
stimulus_frequencies:
  1: 5.45
  2: 6.67
  3: 8.57
  4: 12.0

signal_unit: "uV"

# Same 62-channel montage as MI and ERP
